name: Content Health

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'crawlers/**'
      - 'stories/**'
      - 'scripts/smoke-crawl.mjs'
      - '.github/workflows/content-health.yml'
  schedule:
    # Run every Monday 06:00 UTC. Upstream source structure changes
    # silently — a scheduled smoke-crawl catches them before they rot.
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  smoke-crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22.x'
      - run: node scripts/smoke-crawl.mjs
        continue-on-error: ${{ github.event_name == 'pull_request' }}
