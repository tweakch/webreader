name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Unit tests + build ────────────────────────────────────────────────────
  # Fast, no browser needed. Gates E2E so a broken unit test doesn't waste
  # time on the Playwright browser download.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit

  # ── E2E tests (against local dev server) ─────────────────────────────────
  # Fast fallback path. Always runs. Catches regressions before the preview
  # deployment is even available.
  e2e:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── E2E tests (against Vercel preview URL) ────────────────────────────────
  # The real proof: run the same Playwright suite against the actual deployed
  # artifact. Requires Vercel's GitHub integration posting a deployment_status
  # event with a preview URL. Skipped on main (only preview PRs).
  e2e-preview:
    if: github.event_name == 'pull_request'
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci

      - name: Wait for Vercel preview deployment
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@6c4f1e65e7699b2d72b66742bd1eda68db1180a4  # v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
        continue-on-error: true

      - name: Skip if no preview URL
        if: steps.preview.outputs.url == ''
        run: |
          echo "No Vercel preview URL available — skipping preview E2E."
          echo "Configure the Vercel GitHub integration to enable this job."
          exit 0

      - name: Cache Playwright browsers
        if: steps.preview.outputs.url != ''
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.preview.outputs.url != '' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright against preview URL
        if: steps.preview.outputs.url != ''
        env:
          BASE_URL: ${{ steps.preview.outputs.url }}
        run: npm run test

      - name: Upload preview Playwright report
        if: always() && steps.preview.outputs.url != ''
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: playwright-report-preview
          path: |
            playwright-report/
            test-results/
          retention-days: 7
