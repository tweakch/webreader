name: PR Summary

on:
  pull_request:
    branches: [ "main" ]
  workflow_run:
    workflows: [ "Node.js CI", "Lighthouse" ]
    types: [ completed ]

# Aggregates one sticky comment on the PR with: preview URL, test status,
# Lighthouse deltas, and flag changes. Re-runs on every push and whenever
# the upstream workflows complete, so the comment stays current without
# humans refreshing it.

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    # For workflow_run triggers, only react to PR-triggered runs.
    if: github.event_name == 'pull_request' || github.event.workflow_run.event == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22.x'

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_run: look up the PR that owns the head_sha.
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            PR_JSON=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/pulls" --jq '.[0]')
            if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
              echo "No PR associated with $HEAD_SHA — skipping."
              echo "number=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "base=$(echo "$PR_JSON" | jq -r '.base.sha')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Vercel preview deployment
        id: preview
        if: steps.pr.outputs.number != ''
        uses: patrickedqvist/wait-for-vercel-preview@6c4f1e65e7699b2d72b66742bd1eda68db1180a4  # v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 180
        continue-on-error: true

      - name: Compute flag diff
        id: flags
        if: steps.pr.outputs.number != ''
        run: |
          git fetch --no-tags --depth=1 origin "${{ steps.pr.outputs.base }}" || true
          BASE_REF="${{ steps.pr.outputs.base }}" node scripts/flag-diff.mjs > /tmp/flag-diff.json || echo '{"changes":[]}' > /tmp/flag-diff.json
          echo "path=/tmp/flag-diff.json" >> "$GITHUB_OUTPUT"

      - name: Read check conclusions
        id: checks
        if: steps.pr.outputs.number != ''
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha }}"
          # We only have reliable conclusions for the triggering workflow
          # when using workflow_run. For pull_request, fall back to the
          # latest check-run results.
          get() {
            gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
              --jq ".check_runs[] | select(.name==\"$1\") | .conclusion" | head -n1
          }
          echo "e2e=$(get e2e || echo "")" >> "$GITHUB_OUTPUT"
          echo "e2e_preview=$(get e2e-preview || echo "")" >> "$GITHUB_OUTPUT"
          echo "lighthouse=$(get lighthouse || echo "")" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary body
        id: body
        if: steps.pr.outputs.number != ''
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          E2E_STATUS: ${{ steps.checks.outputs.e2e }}
          E2E_PREVIEW_STATUS: ${{ steps.checks.outputs.e2e_preview }}
          LIGHTHOUSE_STATUS: ${{ steps.checks.outputs.lighthouse }}
          FLAG_DIFF: ${{ steps.flags.outputs.path }}
        run: |
          node scripts/pr-summary.mjs > /tmp/pr-summary.md
          {
            echo 'body<<SUMMARY_EOF'
            cat /tmp/pr-summary.md
            echo 'SUMMARY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert sticky PR comment
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2.9.0
        with:
          header: webreader:pr-summary
          number: ${{ steps.pr.outputs.number }}
          message: ${{ steps.body.outputs.body }}
