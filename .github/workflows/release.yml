name: Release

# Publish a GitHub Release whenever a vX.Y.Z tag is pushed. The release body
# is taken from the matching section of CHANGELOG.md so the source of truth
# stays in the repo.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ steps.meta.outputs.version }}"
          # Awk pulls the block between `## [version]` and the next `## [`.
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && $0 ~ "^## \\["   { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $version; using fallback." >&2
            echo "Release $version" > release-notes.md
          fi

          {
            echo 'notes<<EOF'
            cat release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.0.8
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
