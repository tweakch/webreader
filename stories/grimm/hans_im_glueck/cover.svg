<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Hans im Glück — Illustration">
  <defs>
    <linearGradient id="hans-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="hans-coin" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="60%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#a16207"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="url(#hans-sky)"/>
  <!-- rolling hills -->
  <path d="M0 200 Q100 140 200 180 Q300 220 400 170 L400 240 L0 240 Z" fill="#65a30d"/>
  <path d="M0 220 Q80 190 160 210 Q240 230 400 200 L400 240 L0 240 Z" fill="#4d7c0f"/>
  <!-- winding road -->
  <path d="M40 240 Q170 210 220 200 Q310 190 360 150"
        fill="none" stroke="#fed7aa" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 8"/>
  <!-- sun coin -->
  <circle cx="300" cy="75" r="38" fill="url(#hans-coin)" stroke="#a16207" stroke-width="3"/>
  <text x="300" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#78350f">✦</text>
  <!-- tiny figure -->
  <g transform="translate(80 178)">
    <circle cx="0" cy="-16" r="5" fill="#422006"/>
    <path d="M-6 -11 L-6 4 L-2 4 L0 -5 L2 4 L6 4 L6 -11 Z" fill="#9a3412"/>
    <path d="M-7 -5 L-12 4" stroke="#422006" stroke-width="2"/>
    <path d="M7 -5 L12 4" stroke="#422006" stroke-width="2"/>
  </g>
</svg>
